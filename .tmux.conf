#
# ~/.tmux.conf
#

# STATUS LINE left side: session name
set-option -g status-left \
  '#[reverse] #{?#{e|>:#{server_sessions},1},#[bg=colour66]󰧾 , }\
#[default]#[reverse]#S #[default]'

# Status line right side: cwd, git branch/status and running vm
set-option -g status-right "\
#[fg=colour59]#{=/50/…:#{s|$HOME|~|:pane_current_path}}#[default]\
 #(git_branch_status '#{pane_current_path}')\
#[reverse]#(\
sudo virsh list --name \
  | sed '/^\s*$/d' \
  | tr '\n' ',' \
  | sed 's/,//g'\
  | sed 's/$//'\
)#[reverse,bg=#{?client_prefix,colour211,colour238}]"

set-option -g status-position bottom
set-option -g status-left-length   40
set-option -g status-right-length  60
set-option -g status-style 'bg=terminal,bold,fg=colour0'
set-option -g status-left-style \
  'bg=terminal,bold,fg=#{?client_prefix,colour211,colour238}'

set-option -g window-status-current-format \
  '#[reverse]#I:#W#{?window_flags,#{window_flags}, } #[default]'
set-option -g window-status-format '#I:#W#{?window_flags,#{window_flags}, }'

set-option -g status-keys vi
bind-key 'C-s' set-option status

set-option -g display-panes-time   3000
set-option -g display-time         3000
set-option -g renumber-windows     on

# Set base index for windows and panes to 1
set-option -g base-index      1
set-option -g pane-base-index 1


# BORDERS
set-option -g display-panes-active-colour  yellow
set-option -g pane-border-style fg=black
set-option -g pane-active-border-style '#{?pane_in_mode,fg=yellow,fg=colour104}'
set-option -g popup-border-lines rounded
set-option -g popup-border-style fg=blue


# BINDINGS
bind-key | split-window -hc  '#{pane_current_path}'
bind-key - split-window -vc  '#{pane_current_path}'
bind-key _ split-window -vc  '#{pane_current_path}' -l 25%
bind-key e {
  resize-pane -t-1 -y 25%
  resize-pane -t+1 -y 25%
}
unbind '"'
unbind %

# join marked pane
bind-key j join-pane
# kill other panes
bind-key X confirm-before -p 'Kill all other panes? (y/n)' 'kill-pane -a'

# Activate/deactivate virtual environment using a
bind-key a send-keys Escape 'i' 'eval $(find_venv.sh)' C-m
# Source .tmux.conf
bind-key r source-file ~/.tmux.conf \; display-message "source-file done"

# Layouts
bind-key h select-layout even-horizontal
bind-key v select-layout even-vertical
bind-key B select-layout \
  '7a16,190x49,0,0{95x49,0,0,10,94x49,96,0[94x24,96,0,0,94x24,96,25,5]}'
bind-key b select-layout \
  '8f06,190x49,0,0{95x49,0,0[95x24,0,0,0,95x24,0,25,5],94x49,96,0,12}'


# VI COPY MODE
set-option  -g mode-keys vi
bind-key    -T copy-mode-vi   v  send-keys -X begin-selection
bind-key    -T copy-mode-vi   y  send-keys -X copy-selection
bind-key    -T copy-mode-vi C-v  send-keys -X rectangle-toggle


# Enable MOUSE support
set-option -g mouse on

# True color
set -ga terminal-overrides ",alacritty:Tc=true"

# Enable history file
set-option  -g history-file   ~/.tmux_history
set-option  -g history-limit  5000

# Change prefix key
set-option  -g   prefix M-/
unbind-key  C-b
bind-key    M-/  send-prefix


# Vim Tmux Navigator
# Smart pane switching with awareness of Vim splits.
# https://github.com/christoomey/vim-tmux-navigator
%hidden is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l


# Open ptpython in a popup with chosen modules
bind-key 'C-p' display-popup -w 80 -h 24 -Ed '#{pane_current_path}' '
  tmux new-session -As "py" "pt"'

# tmux command documentation lookup with fuzzy search
bind-key 'C-d' {
  if-shell "tmux has-session -t man" {} {
    display-popup -w 45 -h 14 -E \
      "MANWIDTH=80 man tmux \
        | grep -Po '^\s{7}[a-z]+(-[a-z]+)+' \
        | fzf > /tmp/selected"
  }
  display-popup -w 80 -h 24 -E \
    "tmux new -As 'man' 'man tmux \
      | bat -plman'\\; send \"/^\$(cat /tmp/selected) \" Enter"
}

# Open terminal in a popup
bind-key 'C-t' popup -w 80 -h 24 -Ed '#{pane_current_path}' 'tmux new -As "term"'
bind-key 'C-y' popup -w 80 -h 24 -Ed '#{pane_current_path}' 'tmux new -As "tty"'
