#
# ~/.tmux.conf
#

# STATUS LINE
# Status line left side: session name;  changes color with more than one session
set -g status-left '#[reverse] #{?#{e|>:#{server_sessions},1},#[bg=colour66],} '
set -ag status-left '#[default]#[reverse]#S #[default]'

# Status line right side: cwd, git branch/status and running vm
set -g status-right "#[fg=colour59]#{=/50/…:#{s|$HOME|~|:pane_current_path}}"
set -ag status-right "#[default] #(
  git -C '#{pane_current_path}' status --branch --porcelain=v2            \
    | awk '{                                                              \
        if ($2 == \"branch.head\") { branch = \" \" $3; status = \" \" }  \
        if ($1 != \"#\") { status = \" \" }                              \
      } END { print branch status }'                                      \
)"
set -ag status-right "#[reverse]#( \
virsh -c qemu:///system list --name \
  | sed '/^\s*$/d'                  \
  | tr '\n' ','                     \
  | sed 's/,//g'                   \
  | sed 's/$//'                    \
)"
set -ag status-right "#[reverse,bg=#{?client_prefix,colour211,colour238}]"

set-option -g status-left-length   40
set-option -g status-right-length  70
set-option -g status-style 'bg=terminal,bold,fg=colour0'
set-option -g status-left-style \
  'bg=terminal,bold,fg=#{?client_prefix,colour211,colour238}'

set-option -g window-status-current-format \
  '#[reverse]#I:#W#{?window_flags,#{window_flags}, } #[default]'
set-option -g window-status-format '#I:#W#{?window_flags,#{window_flags}, }'

set-option -g status-keys vi
bind-key 'C-s' set-option status

set-option -g display-panes-time   3000
set-option -g display-time         3000
set-option -g renumber-windows     on

# Set base index for windows and panes to 1
set-option -g base-index      1
set-option -g pane-base-index 1

# Set titles, change qtile clock fg with prefix
set-option -g set-titles on
set-option -g set-titles-string '#W#{?client_prefix,\
#(                                                  \
qtile cmd-obj                                       \
 -o widget clock                                    \
 -f set_font                                        \
 -k foreground="#ff87af"                            \
>/dev/null 2>&1                                     \
),\
#(                                                  \
qtile cmd-obj                                       \
 -o widget clock                                    \
 -f set_font                                        \
 -k foreground="#a1a1a1"                            \
>/dev/null 2>&1                                     \
)}'
# Reset qtile clock foreground color when client is detached
set-hook -g client-detached 'run-shell "            \
qtile cmd-obj                                       \
 -o widget clock                                    \
 -f set_font                                        \
 -k foreground=\"#a1a1a1\"                          \
>/dev/null 2>&1                                     \
"'

# BORDERS
set-option -g display-panes-active-colour  yellow
set-option -g pane-border-style fg=black
set-option -g pane-active-border-style '#{?pane_in_mode,fg=yellow,fg=colour104}'
set-option -g popup-border-lines rounded
set-option -g popup-border-style fg=blue


# BINDINGS
# new pane is 80 col if window is >= 160, else half window width
bind-key | split-window -hc  '#{pane_current_path}' \
  -l '#{?#{e|>=:#{window_width},160},80,#{e|/:#{window_width},2}}'
bind-key - split-window -vc  '#{pane_current_path}'
bind-key _ split-window -vc  '#{pane_current_path}' -l 25%
bind-key e {
  resize-pane -t-1 -y 25%
  resize-pane -t+1 -y 25%
}
unbind '"'
unbind %

# Move marked pane after current
bind-key j join-pane
# kill other panes
bind-key X confirm-before -p 'Kill all other panes? (y/n)' 'kill-pane -a'

# Activate/deactivate virtual environment
bind-key a send-keys Escape 'i' 'eval $(find_venv.sh)' C-m
# Source .tmux.conf
bind-key r source-file ~/.tmux.conf \; display-message "source-file done"

# Layouts
bind-key V select-layout even-horizontal
bind-key v select-layout even-vertical


# VI COPY MODE
set-option  -g mode-keys vi
bind-key    -T copy-mode-vi   v  send-keys -X begin-selection
bind-key    -T copy-mode-vi   y  send-keys -X copy-selection
bind-key    -T copy-mode-vi C-v  send-keys -X rectangle-toggle


# Enable MOUSE support
set-option -g mouse on

# True color
set -ga terminal-overrides ",*tty:Tc=true"

# Enable history file
set-option  -g history-file   ~/.tmux_history
set-option  -g history-limit  5000

# Change prefix key
set-option  -g   prefix M-/
unbind-key  C-b
bind-key    M-/  send-prefix

unbind-key l
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -L


# tmux command lookup with fuzzy search
bind-key F1 {
  if-shell 'tmux has-session -t man' {} {
    display-popup -w 45 -h 14 -E            \
      "MANWIDTH=80 man tmux                 \
        | grep -Po '^\s{5}[a-z]+(-[a-z]+)+' \
        | fzf > /tmp/selected"
  }
  display-popup -w 80 -h 24 -E    \
    "tmux new -As 'man' 'man tmux'\\; send \"/^\$(cat /tmp/selected)\" Enter"
}

# Open terminal in a popup
bind-key 'C-t' popup -w 80 -h 24 -Ed '#{pane_current_path}' 'tmux new -As "term"'
bind-key 'C-y' popup -w 80 -h 24 -Ed '#{pane_current_path}' 'tmux new -As "tty"'
